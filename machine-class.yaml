metadata:
    namespace: default
    type: MachineClasses.omni.sidero.dev
    id: one-node-cluster
spec:
    matchlabels: []
    autoprovision:
        providerid: Incus-Z2
        kernelargs: []
        metavalues: []
        providerdata: |
            cpu: 4
            memory: 8192
            diskSize: 40
            profiles:
              - vlan10
            additionalDisks:
              - pool: nvme1n1-pool-btrfs
                size: 100GiB
        grpctunnel: 0
